<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>reNews - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 h-screen flex items-center justify-center">
    <div
      class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm border border-gray-200"
    >
      <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">
        reNews Admin ⚙️
      </h2>

      <div
        id="errorBox"
        class="hidden mb-4 p-3 bg-red-100 text-red-700 text-sm rounded border border-red-200 text-center"
      ></div>

      <form id="loginForm" class="flex flex-col gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Username</label
          >
          <input
            type="text"
            id="username"
            required
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Password</label
          >
          <input
            type="password"
            id="password"
            required
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>
        <button
          type="submit"
          id="loginBtn"
          class="mt-4 bg-gray-800 text-white font-medium py-2 rounded hover:bg-gray-700 transition"
        >
          Login
        </button>
      </form>
      <div class="mt-4 text-center">
        <a href="/" class="text-sm text-gray-500 hover:text-gray-800"
          >&larr; Back to Dashboard</a
        >
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("loginBtn");
          const errorBox = document.getElementById("errorBox");
          btn.disabled = true;
          btn.textContent = "Verifying...";

          const formData = new FormData();
          formData.append(
            "username",
            document.getElementById("username").value,
          );
          formData.append(
            "password",
            document.getElementById("password").value,
          );

          try {
            const response = await fetch("/api/auth/login", {
              method: "POST",
              body: formData,
            });

            if (response.ok) {
              // Cookie is automatically saved by the browser!
              window.location.href = "/admin";
            } else {
              const data = await response.json();
              errorBox.textContent = data.detail || "Login failed";
              errorBox.classList.remove("hidden");
              btn.disabled = false;
              btn.textContent = "Login";
            }
          } catch (err) {
            errorBox.textContent = "Network error";
            errorBox.classList.remove("hidden");
            btn.disabled = false;
            btn.textContent = "Login";
          }
        });
    </script>
  </body>
</html>
